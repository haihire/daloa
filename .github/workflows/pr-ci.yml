name: PR CI

on:
  pull_request:
    branches: [main]

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install client dependencies
        working-directory: client
        run: npm ci

      - name: Install server dependencies
        working-directory: server
        run: npm ci

      - name: Lint client
        working-directory: client
        run: npm run lint

      - name: Lint server
        working-directory: server
        run: npm run lint

      - name: Run shared test harness
        shell: pwsh
        run: ./scripts/test.ps1

      - name: Build client
        working-directory: client
        run: npm run build

      - name: Build server
        working-directory: server
        run: npm run build
