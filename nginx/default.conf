# IP당 분당 120회 제한 (버스트 30회 허용)
limit_req_zone $binary_remote_addr zone=api_per_ip:10m rate=120r/m;

# HTTP → HTTPS 리다이렉트
server {
    listen 80;
    server_name api.daloa.kr;
    return 301 https://$host$request_uri;
}

# HTTPS: api.daloa.kr → NestJS
server {
    listen 443 ssl;
    server_name api.daloa.kr;

    ssl_certificate     /etc/letsencrypt/live/api.daloa.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.daloa.kr/privkey.pem;

    location / {
        limit_req zone=api_per_ip burst=30 nodelay;
        proxy_pass         http://nest:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
