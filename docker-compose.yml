services:
  mysql:
    image: mysql:8.0
    container_name: daloa-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASS}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${DB_ROOT_PASS}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - daloa-net

  redis:
    image: redis:7-alpine
    container_name: daloa-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    networks:
      - daloa-net

  nest:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: daloa-nest
    restart: unless-stopped
    env_file: .env
    environment:
      DB_HOST: mysql
      REDIS_HOST: redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - daloa-net

  nginx:
    image: nginx:alpine
    container_name: daloa-nginx
    restart: unless-stopped
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - nest
    networks:
      - daloa-net

volumes:
  mysql_data:
  redis_data:

networks:
  daloa-net:
    driver: bridge
